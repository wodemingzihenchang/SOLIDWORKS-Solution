<body>
    <!-- 筛选按钮 -->
    <h2>筛选按钮</h2>
    <button class="tags_button" id="addSlwBtn">tags:SOLIDWORKS</button>
    <button class="tags_button" id="addPdmBtn">tags:PDM</button>

            <input type="text" id="local-search-input" name="q" results="0" placeholder="Search"
                class="st-search-input st-default-search-input form-control">

    <script type="text/javascript">
        var search_path = "SOLIDWORKS-Solution/search.xml";
        if (search_path.length == 0) { search_path = "SOLIDWORKS-Solution/search.xml"; }
        var path = '/' + search_path;
        searchFunc(path, 'local-search-input', 'local-search-result');
    </script>

    <script>
        // 获取文本框元素
        const textarea = document.getElementById('local-search-input');
        // 获取两个按钮 
        const SlwBtn = document.getElementById('addSlwBtn');
        const PdmBtn = document.getElementById('addPdmBtn');
        const SimBtn = document.getElementById('addSimBtn');
        const FloBtn = document.getElementById('addFloBtn');
        const ComBtn = document.getElementById('addComBtn');
        const VisBtn = document.getElementById('addVisBtn');
        const EleBtn = document.getElementById('addEleBtn');

        // 通用的在光标处（或末尾）插入文本的函数
        function insertTextAtCursor(textToInsert) {
            // 获取当前文本框内容
            const currentValue = textarea.value;
            // 获取光标起始位置和结束位置（如果有选中文字，起始≠结束）
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;

            // 如果文本框没有任何内容，或者光标在末尾且没有选中任何文字，直接在末尾添加
            if (currentValue === '' || (start === end && start === currentValue.length)) {
                // 如果当前内容为空，直接赋值标签
                if (currentValue === '') {
                    textarea.value = textToInsert;
                } else {
                    // 否则在末尾添加，并加上换行符让内容更整洁
                    textarea.value = currentValue + '\n' + textToInsert;
                }
                // 将光标移动到插入文本的末尾
                textarea.setSelectionRange(textarea.value.length, textarea.value.length);
            }
            // 如果有选中文字，用新文本替换选中的部分
            else if (start !== end) {
                const newValue = currentValue.substring(0, start) + textToInsert + currentValue.substring(end);
                textarea.value = newValue;
                // 光标移动到插入文本之后
                const newCursorPos = start + textToInsert.length;
                textarea.setSelectionRange(newCursorPos, newCursorPos);
            }
            // 光标在文本中间（没有选中文字），直接在光标位置插入
            else {
                const newValue = currentValue.substring(0, start) + textToInsert + currentValue.substring(start);
                textarea.value = newValue;
                // 光标移动到插入文本之后
                const newCursorPos = start + textToInsert.length;
                textarea.setSelectionRange(newCursorPos, newCursorPos);
            }

            // 让文本框重新获得焦点，方便继续输入
            textarea.focus();
        }

        // 为 SOLIDWORKS 按钮绑定点击事件
        SlwBtn.addEventListener('click', function () {
            insertTextAtCursor(' tags:SOLIDWORKS ');
        });
        PdmBtn.addEventListener('click', function () {
            insertTextAtCursor(' tags:PDM ');
        });
        SimBtn.addEventListener('click', function () {
            insertTextAtCursor(' tags:Simulation ');
        });
        FloBtn.addEventListener('click', function () {
            insertTextAtCursor(' tags:FlowSimulation ');
        });
        ComBtn.addEventListener('click', function () {
            insertTextAtCursor(' tags:Composer ');
        });
        VisBtn.addEventListener('click', function () {
            insertTextAtCursor(' tags:Visualize ');
        });
        EleBtn.addEventListener('click', function () {
            insertTextAtCursor(' tags:Electrical ');
        });
    </script>

</body>
