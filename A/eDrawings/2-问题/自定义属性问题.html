<div id="article"><h1 id="自定义属性问题"><a href="#自定义属性问题" class="headerlink" title="自定义属性问题"></a>自定义属性问题</h1><h2 id="问题"><a href="#问题" class="headerlink" title="问题"></a>问题</h2><p>当我在 eDrawings程序中打开 SOLIDWORKS 工程图文件时，为什么自定义属性不更新匹配 SOLIDWORKS中的自定义属性值？</p>
<h2 id="原因"><a href="#原因" class="headerlink" title="原因"></a>原因</h2><p>未安装 SolidWorks® 文档管理器 API 时，就可能发生此问题。</p>
<h2 id="方法"><a href="#方法" class="headerlink" title="方法"></a>方法</h2><p>要下载 SOLIDWORKS 文档管理器 API 安装程序，请访问以下网站：<a target="_blank" rel="noopener" href="http://www.solidworks.com/plugins/edrawings/download.cfm?Release=LATEST&Type=DOCMGR64">下载</a></p>
