        <div id="article"><h1 id="单机版许可转移"><a href="#单机版许可转移" class="headerlink" title="单机版许可转移"></a>单机版许可转移</h1><p>1、找到SW程序文件目录的“swactwiz.exe”程序，位置：</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">&lt;SolidWorks程序文件目录&gt;\SOLIDWORKS\setup\i386</span><br></pre></td></tr></table></figure>

<p>或找到SW安装包目录的“swactwiz.exe”程序，位置：</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">&lt;SOLIDWORKS 安装包&gt;\Support\swactwiz</span><br></pre></td></tr></table></figure>

<p> 2、打开“swactwiz.exe”选择“转移产品许可到新的&#x2F;已升级的计算机”。</p>
<img src="https://img.r77817520.nyat.app:18981/Hexo/转移许可1.png">

<p>3、选择所有许可，选择下一步进行许可停用（转移）。</p>
<img src="https://img.r77817520.nyat.app:18981/Hexo/转移许可2.png">

<p>3、转移完成后，选择在新电脑安装SW时，输入回序列号即可完成在新电脑的激活。</p>
<img src="https://img.r77817520.nyat.app:18981/Hexo/转移许可3.png">
