<div id="article"><h1 id="图层"><a href="#图层" class="headerlink" title="图层"></a>图层</h1><h2 id="定义"><a href="#定义" class="headerlink" title="定义"></a>定义</h2><img src="http://8.162.5.68:6196/Hexo/image-20250401100636570.png">



<h2 id="颜色"><a href="#颜色" class="headerlink" title="颜色"></a>颜色</h2><p>正常在图层画草图，颜色会随图层的，如果没有，那打开线型，在颜色里设置</p>
<p>但线段颜色不随图层显示和变化时，可以打开【线型-颜色】勾选“默认”颜色选项。</p>
<img src="http://8.162.5.68:6196/Hexo/image-20250401100533057.png">



<h1 id="线型"><a href="#线型" class="headerlink" title="线型"></a>线型</h1><h2 id="颜色-1"><a href="#颜色-1" class="headerlink" title="颜色"></a>颜色</h2><img src="http://8.162.5.68:6196/Hexo/image-20250401100533057.png">

<h2 id="线型-1"><a href="#线型-1" class="headerlink" title="线型"></a>线型</h2><p>线型比例调整</p>
<p>大小间距可以自定义，：就是设置里的【文档属性，线条样式，虚线】设置：A,0.4,-0.2</p>
