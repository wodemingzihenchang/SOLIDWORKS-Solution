<div id="article"><h1 id="接收不到邮件通知"><a href="#接收不到邮件通知" class="headerlink" title="接收不到邮件通知"></a>接收不到邮件通知</h1><img src="接收不到邮件通知/重命名失败.png">

<h2 id="检查原因"><a href="#检查原因" class="headerlink" title="检查原因"></a>检查原因</h2><p>登陆SQL管理，在对应数据库中查看该列表：dbo.DocumentActionInfo</p>
<p><img src="/SOLIDWORKS-Solution/%E6%8E%A5%E6%94%B6%E4%B8%8D%E5%88%B0%E9%82%AE%E4%BB%B6%E9%80%9A%E7%9F%A5/image-20250908103621161.png" alt="image-20250908103621161"></p>
<h2 id="方法"><a href="#方法" class="headerlink" title="方法"></a>方法</h2><p> 如果发现这里的确有积压，那就重启PDM数据库服务器；</p>
<p><img src="/SOLIDWORKS-Solution/%E6%8E%A5%E6%94%B6%E4%B8%8D%E5%88%B0%E9%82%AE%E4%BB%B6%E9%80%9A%E7%9F%A5/image-20250908103724938.png" alt="image-20250908103724938"></p>
<h2 id="方法2"><a href="#方法2" class="headerlink" title="方法2"></a>方法2</h2><p>也可以在SQL对应的数据库进行积压清理，语句为：</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">TRUNCATE TABLE DocumentActionInfo</span><br></pre></td></tr></table></figure>

<h2 id="方法3"><a href="#方法3" class="headerlink" title="方法3"></a>方法3</h2><p>如果前面两种方法都不行的话，那就单独卸载数据库服务，就是把勾选取消；重启电脑后再勾选起来；（不会影响到存在的库，就是一种服务）</p>
