        <div id="article"><h1 id="PDM-文件不是细节显示"><a href="#PDM-文件不是细节显示" class="headerlink" title="PDM-文件不是细节显示"></a>PDM-文件不是细节显示</h1><p> 文件不是细节（详细信息）的显示，没有显示文件夹里的列属性。</p>
<p><img src="https://img.r77817520.nyat.app:18981/Hexo/image-20260421165810170.png" alt="image-20260421165810170"></p>
<h2 id="方法"><a href="#方法" class="headerlink" title="方法"></a>方法</h2><p>1、打开任意一个文件夹，如“此电脑”或“文档”。 设置好文件显示样式，选择“详细信息”视图：</p>
<p><img src="https://img.r77817520.nyat.app:18981/Hexo/image-20260421170511505.png" alt="image-20260421170511505"></p>
<p>2、设置全部为默认显示方式：在“查看”菜单中，找到并点击“选项”或“文件夹选项”。在打开的对话框中选择“查看”标签页。勾选“应用到文件夹”的选项。点击“确定”或“应用”按钮保存设置。</p>
<p><img src="https://img.r77817520.nyat.app:18981/Hexo/image-20260421170554907.png" alt="image-20260421170554907"></p>
