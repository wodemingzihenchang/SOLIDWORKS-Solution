<div id="article"><h1 id="PDM输出无法找到文件"><a href="#PDM输出无法找到文件" class="headerlink" title="PDM输出无法找到文件"></a>PDM输出无法找到文件</h1><p>这是因为在【模板】内，存在有预定义的文件生成模板。当该文件没在库内时，输出PDM配置文件就会提示：PDM输出无法找到文件</p>
<img src="PDM输出无法找到文件/PDM输出无法找到文件.png">

<p>找到【模板】内的设置，找到预设文件。可以选择删除。或者在PDM库文件夹内新建该文件。</p>
<img src="PDM输出无法找到文件/image-20250205113401173.png">

<p>之后再操作PDM输出</p>
