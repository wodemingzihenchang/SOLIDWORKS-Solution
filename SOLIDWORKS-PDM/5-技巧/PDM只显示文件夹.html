<div id="article"><h1 id="PDM只显示文件夹"><a href="#PDM只显示文件夹" class="headerlink" title="PDM只显示文件夹"></a>PDM只显示文件夹</h1><h2 id="需求场景："><a href="#需求场景：" class="headerlink" title="需求场景："></a>需求场景：</h2><p>用户可以看到完整的文件夹架构，但是不会让他看到文件夹内的文件内容。这可以让用户知道完整的文件夹组成，但不会直接给看到保密内容；后续按需申请权限即可。</p>
<h2 id="方法"><a href="#方法" class="headerlink" title="方法"></a>方法</h2><p>设置“读取文件内容”。取消“显示文件的工作版本”。</p>
<img src="PDM只显示文件夹/image-20251114182105921.png">

<p>实际的“显示文件的工作版本”权限按需分配，这有几种方式进行分配：</p>
<p>1、文件夹属性，权限；</p>
<p>2、创建模板时分配；</p>
<p>3、PDM后台管理里，分配。</p>
</div>
